{% extends "layout.html" %}
{% block content %}

<h3 class="mb-4">Search Results</h3>

{% if cars %}
<div class="row">
    {% for car in cars %}
    <div class="col-md-4 mb-4">
        <div class="card shadow h-100">
            <img src="{{ url_for('static', filename='uploads/' + car.image) }}" class="card-img-top">
            <div class="card-body">
                <h5>{{ car.model }}</h5>
                <a href="/car/{{ car.id }}" class="btn btn-dark">
                    View Details
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<p>No cars found.</p>
{% endif %}

{% endblock %}
